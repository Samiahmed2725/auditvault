# PostgreSQL Connection (Supabase)
# Uses Environment Variables when deployed on Render, defaults to your free Supabase instance locally.
spring.datasource.url=${DB_URL:jdbc:postgresql://db.ksukohaanttjvwvsvbhm.supabase.co:5432/postgres}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
# TODO: Replace this default with your actual Supabase Database Password if running locally
spring.datasource.password=${DB_PASSWORD:REPLACE_WITH_YOUR_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# API routing matching
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
server.port=8081

# Supabase Storage Configuration
supabase.url=${SUPABASE_URL:https://ksukohaanttjvwvsvbhm.supabase.co}
supabase.key=${SUPABASE_KEY:sb_publishable_wd-TcQrdLkIxv3P63pkVMA_WI_zMBr5}
supabase.bucket=${SUPABASE_BUCKET:auditvault-docs}
