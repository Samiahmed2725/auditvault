# Profiles
# Local uses H2; production uses PostgreSQL (Supabase/Render).
spring.profiles.default=local

# API routing matching
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
server.address=0.0.0.0
server.port=${PORT:8082}

# Supabase Storage Configuration
supabase.url=${SUPABASE_URL:https://ksukohaanttjvwvsvbhm.supabase.co}
supabase.key=${SUPABASE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:auditvault-docs}

# JWT
# Set jwt.secret to a strong random string (>= 32 chars). If unset, a random key is generated at runtime (tokens reset on restart).
jwt.secret=${JWT_SECRET:}

