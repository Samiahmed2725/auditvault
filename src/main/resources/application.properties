# Database
# Local default: H2 in-memory (PostgreSQL compatibility). For production/deploy, set DB_URL/DB_USERNAME/DB_PASSWORD.
spring.datasource.url=${DB_URL:jdbc:h2:mem:auditvault;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# API routing matching
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
server.address=0.0.0.0
server.port=${PORT:8082}

# Supabase Storage Configuration
supabase.url=${SUPABASE_URL:https://ksukohaanttjvwvsvbhm.supabase.co}
supabase.key=${SUPABASE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:auditvault-docs}

# JWT
# Set jwt.secret to a strong random string (>= 32 chars). If unset, a random key is generated at runtime (tokens reset on restart).
jwt.secret=${JWT_SECRET:auditvault-secret-key-123456789}

